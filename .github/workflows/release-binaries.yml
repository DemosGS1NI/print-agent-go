name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build, sign and package Windows binaries
        shell: pwsh
        env:
          WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $bin = 'dist/print-agent-windows-amd64.exe'
          $zip = 'dist/print-agent-windows-amd64.zip'

          $env:CGO_ENABLED = '0'
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -trimpath -ldflags '-s -w' -o $bin .

          if ($env:WINDOWS_SIGN_CERT_BASE64 -and $env:WINDOWS_SIGN_CERT_PASSWORD) {
            Write-Host 'Signing executable with signtool...'
            $certPath = "$env:RUNNER_TEMP\codesign.pfx"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_BASE64))

            & signtool sign /fd SHA256 /td SHA256 /tr "http://timestamp.digicert.com" /f $certPath /p $env:WINDOWS_SIGN_CERT_PASSWORD $bin
            if ($LASTEXITCODE -ne 0) { throw 'signtool signing failed' }

            Remove-Item -Force $certPath
          }
          else {
            Write-Host 'Signing skipped: configure WINDOWS_SIGN_CERT_BASE64 and WINDOWS_SIGN_CERT_PASSWORD secrets.'
          }

          Compress-Archive -Path $bin -DestinationPath $zip -Force

          Get-FileHash -Algorithm SHA256 $bin, $zip |
            ForEach-Object { "{0} *{1}" -f $_.Hash.ToLower(), (Split-Path -Leaf $_.Path) } |
            Out-File -FilePath 'dist/SHA256SUMS-windows.txt' -Encoding ascii

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/print-agent-windows-amd64.exe
            dist/print-agent-windows-amd64.zip
            dist/SHA256SUMS-windows.txt

  build-macos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build and package macOS binary
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/print-agent-darwin-arm64 .
          tar -C dist -czf dist/print-agent-darwin-arm64.tar.gz print-agent-darwin-arm64
          sha256sum dist/print-agent-darwin-arm64 dist/print-agent-darwin-arm64.tar.gz > dist/SHA256SUMS-darwin.txt

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            dist/print-agent-darwin-arm64
            dist/print-agent-darwin-arm64.tar.gz
            dist/SHA256SUMS-darwin.txt

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/print-agent-windows-amd64.exe
            release-assets/print-agent-windows-amd64.zip
            release-assets/SHA256SUMS-windows.txt
            release-assets/print-agent-darwin-arm64
            release-assets/print-agent-darwin-arm64.tar.gz
            release-assets/SHA256SUMS-darwin.txt